<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>红宝书</title>
  <style>
    body { width: 300px; padding: 16px; font-family: "Microsoft YaHei", "PingFang SC", sans-serif; margin: 0; }
    h2 { margin: 0 0 12px 0; color: #c41e1e; font-size: 16px; letter-spacing: 2px; }
    p { margin: 0 0 10px 0; font-size: 13px; color: #666; }
    label { font-size: 13px; color: #333; font-weight: 500; display: block; margin-bottom: 4px; }
    input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; box-sizing: border-box; margin-bottom: 10px; font-family: inherit; }
    button { width: 100%; padding: 8px; background: #c41e1e; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 500; font-family: inherit; }
    button:hover { background: #a01818; }
    #status { font-size: 12px; margin-top: 8px; text-align: center; }
    .success { color: #2e7d32; }
    .error { color: #c62828; }
  </style>
</head>
<body>
  <h2>📕 红宝书</h2>
  <p>用矛盾分析法分析算法问题</p>
  <label for="api-key">DeepSeek API Key</label>
  <input type="password" id="api-key" placeholder="sk-..." />
  <button id="save">保存</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
